<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Made For You 🎁</title>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --pink: #ff85a1; --bg: #ffeef2; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Arial', sans-serif; }
        
        /* 1. AMPLOP */
        .screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; position: absolute; width: 100%; transition: 1s; }
        .envelope { width: 150px; height: 100px; background: var(--pink); border-radius: 0 0 10px 10px; cursor: pointer; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .envelope::after { content: ''; position: absolute; top: -70px; left: 0; border-left: 75px solid transparent; border-right: 75px solid transparent; border-bottom: 70px solid var(--pink); }

        /* 2. TEKS TYPEWRITER */
        #text-container { font-size: 20px; color: #d63384; text-align: center; padding: 20px; font-weight: bold; }
        .hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        /* 3. BUKU (FLIPBOOK) */
        .book-container { display: none; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
        #book { background: white; box-shadow: 0 0 20px rgba(0,0,0,0.2); }
        .page { background-color: white; padding: 20px; border: 1px solid #ddd; overflow: hidden; }
        .page-content { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .page img { width: 80%; border-radius: 10px; margin-bottom: 10px; }
        .page p { font-size: 14px; color: #555; text-align: center; }

        /* DEKORASI */
        .heart { position: fixed; top: -20px; animation: fall linear forwards; z-index: 100; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div id="screen1" class="screen">
        <div class="envelope" onclick="startApp()">
            <div style="position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); color:white; font-size:30px;">❤️</div>
        </div>
        <p style="margin-top:20px; color:#888;">Klik untuk Membuka</p>
    </div>

    <div id="screen2" class="screen hidden">
        <img id="gif-typing" src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif" width="120">
        <div id="text-container"></div>
    </div>

    <div id="screen3" class="book-container">
        <div id="book">
            <div class="page">
                <div class="page-content">
                    <h2>For You 🌸</h2>
                    <p>Buka halaman selanjutnya ya...</p>
                </div>
            </div>
            <div class="page">
                <div class="page-content">
                    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExMG04dnZ0amV6eGZidHhndXJ6eGZidHhndXJ6eGZidHhndXJ6ZSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/KztT2c4u8mYYUiMKdJ/giphy.gif">
                    <p>Hari ini spesial karena ada kamu.</p>
                </div>
            </div>
            <div class="page">
                <div class="page-content">
                    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNGh4cnR4Z3J6eGZidHhndXJ6eGZidHhndXJ6eGZidHhndXJ6ZSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/J6DkQ9e3e3b3O/giphy.gif">
                    <p>Makasih udah selalu sabar.</p>
                </div>
            </div>
            <div class="page">
                <div class="page-content">
                    <h2>The End ❤️</h2>
                    <p>I love you so much!</p>
                </div>
            </div>
        </div>
        <p style="margin-top:20px; font-size:12px; color:#888;">Geser ujung halaman untuk membalik</p>
    </div>

    <audio id="bgm" loop src="https://www.chosic.com/wp-content/uploads/2021/04/And-So-It-Begins-Inspired-By-Departure.mp3"></audio>

    <script>
        const messages = ["Hai sayang...|Cuma mau bilang...|Kamu itu berharga banget.|Makasih ya buat semuanya.|Aku punya sesuatu buat kamu.|Cek ini ya!"];
        let msgIdx = 0;

        function startApp() {
            document.getElementById('bgm').play();
            document.getElementById('screen1').classList.add('hidden');
            setTimeout(() => {
                document.getElementById('screen1').style.display = 'none';
                document.getElementById('screen2').classList.remove('hidden');
                typeWriter(messages[0].split('|'), 0);
                setInterval(createHeart, 300);
            }, 1000);
        }

        function typeWriter(arr, idx) {
            if (idx < arr.length) {
                let i = 0;
                let display = document.getElementById('text-container');
                display.innerHTML = "";
                function typing() {
                    if (i < arr[idx].length) {
                        display.innerHTML += arr[idx].charAt(i);
                        i++;
                        setTimeout(typing, 100);
                    } else {
                        setTimeout(() => typeWriter(arr, idx + 1), 2000);
                    }
                }
                typing();
            } else {
                initBook();
            }
        }

        function initBook() {
            document.getElementById('screen2').classList.add('hidden');
            setTimeout(() => {
                document.getElementById('screen2').style.display = 'none';
                document.getElementById('screen3').style.display = 'flex';
                
                const pageFlip = new St.PageFlip(document.getElementById('book'), {
                    width: 300,
                    height: 400,
                    showCover: true
                });
                pageFlip.loadFromHTML(document.querySelectorAll('.page'));
            }, 1000);
        }

        function createHeart() {
            const h = document.createElement('div');
            h.className = 'heart';
            h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = Math.random() * 20 + 10 + 'px';
            h.style.animationDuration = Math.random() * 3 + 2 + 's';
            h.style.opacity = Math.random();
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }
    </script>
</body>
</html>
